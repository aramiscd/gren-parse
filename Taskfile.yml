# go get -u -v github.com/go-task/task

version : 2

tasks :
    repl :
        cmds : [ " cabal v2-repl " ]
        
    build :
        cmds : [ " cabal v2-build " ]

    test :
        cmds : [ " cabal v2-run test " ]

    install :
        cmds : [ " cabal --overwrite-policy=always v2-install " ]

    clean :
        cmds : [ " rm -rf dist-newstyle/build/*/*/ulme-parse-* " ]

    clean-all :
        cmds : [ " cabal v2-clean " ]
